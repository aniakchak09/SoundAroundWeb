spring:
  datasource:
    url: jdbc:postgresql://<SUPABASE_POOLER_HOST>:5432/postgres?sslmode=require
    username: postgres.<SUPABASE_PROJECT_REF>
    password: <DB_PASSWORD>
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: <MAILTRAP_USERNAME>
    password: <MAILTRAP_PASSWORD>
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: <BASE64_256BIT_SECRET>
    expiration: 86400000

lastfm:
  api-key: <LASTFM_API_KEY>
